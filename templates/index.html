<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF2MD · 基于 PaddleOCR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 PDF2MD <small>base PaddleOCR</small></h1>
            <p class="subtitle">批量上传 PDF → Markdown · 多 API Key 自动并发 · 实时进度</p>
        </header>

        <!-- 上传表单 -->
        <section id="upload-card" class="card">
            <form id="upload-form">
                <div class="field">
                    <label>PDF 文件（可多选）</label>
                    <div id="dropzone" class="dropzone">
                        <input type="file" id="file" name="file" accept=".pdf" multiple hidden>
                        <p id="dropzone-text">点击或拖拽 PDF 到此处（支持多选）</p>
                        <p id="dropzone-hint" class="hint">仅支持 .pdf</p>
                    </div>
                    <div id="file-list" class="file-list"></div>
                </div>

                <div class="field">
                    <label for="api_keys">PaddleOCR API Key（每行一个，多个自动并发）</label>
                    <textarea id="api_keys" name="api_keys" rows="3"
                              placeholder="20fe0f98...&#10;粘贴第 2 个 Key 即开启 2 路并发"></textarea>
                    <small class="hint">并发数 = Key 数；单 Key 时逐个顺序处理。仅用于本次请求，不落盘。</small>
                </div>

                <div class="field">
                    <label>输出命名方式</label>
                    <div class="radios">
                        <label class="radio">
                            <input type="radio" name="naming" value="filename" checked>
                            <span>使用 PDF 文件名（默认）</span>
                        </label>
                        <label class="radio">
                            <input type="radio" name="naming" value="custom">
                            <span>自定义名称</span>
                        </label>
                    </div>
                    <input type="text" id="custom_name" name="custom_name"
                           placeholder="自定义名称（多文件时自动加序号）" disabled>
                </div>

                <div class="field">
                    <label for="pages_per_chunk">每卷页数</label>
                    <input type="number" id="pages_per_chunk" name="pages_per_chunk"
                           value="30" min="5" max="100">
                </div>

                <button type="submit" id="submit-btn" class="primary" disabled>开始批量解析</button>
                <p id="form-error" class="error-text"></p>
            </form>
        </section>

        <!-- 进度面板 -->
        <section id="progress-card" class="card hidden">
            <div class="progress-header">
                <h2 id="job-title">批量解析中…</h2>
                <span id="job-status" class="badge running">运行中</span>
            </div>

            <div class="bar-wrap">
                <div id="bar" class="bar"></div>
                <span id="bar-pct" class="bar-pct">0%</span>
            </div>

            <div class="stats">
                <div class="stat"><span class="label">文件进度</span><span id="stat-files" class="value">-</span></div>
                <div class="stat"><span class="label">并发数</span><span id="stat-conc" class="value">-</span></div>
                <div class="stat"><span class="label">成功 / 失败</span><span id="stat-ok" class="value">-</span></div>
                <div class="stat"><span class="label">用时</span><span id="stat-elapsed" class="value">-</span></div>
            </div>

            <div class="file-rows" id="file-rows"></div>

            <div class="actions">
                <button id="cancel-btn" class="ghost">取消任务</button>
                <a id="download-all-btn" class="primary hidden" href="#">⬇ 下载全部 (zip)</a>
                <button id="reset-btn" class="ghost hidden">解析新一批</button>
            </div>
        </section>

        <footer>
            <p>OCR 由 <a href="https://www.paddleocr.ai" target="_blank" rel="noopener">PaddleOCR-VL</a> 提供 · 仅供学习使用</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
